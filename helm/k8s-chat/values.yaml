# k8s-chat simple demo values
replicaCount: 1

image:
  repository: k8s-chat
  pullPolicy: IfNotPresent
  tag: "simple"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: k8s-chat.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Secret configuration - assumes k8s-chat-anthropic secret exists
secret:
  name: "k8s-chat-anthropic"
  key: "api-key"

# Environment variables
env:
  KUBERNETES_NAMESPACE: "default"
