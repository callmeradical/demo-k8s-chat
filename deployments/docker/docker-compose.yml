services:
  k8s-chat:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    volumes:
      # Mount kubeconfig if running locally with cluster access
      - ${HOME}/.kube:/root/.kube:ro
      # Required for systemd
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
